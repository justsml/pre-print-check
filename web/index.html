<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pre-print Tools</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232563eb'/%3E%3Cpath d='M9 9h14v14H9z' fill='none' stroke='white' stroke-width='2.4'/%3E%3Cpath d='M13 16h6M16 13v6' stroke='white' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Segoe UI Variable", "Segoe UI", "Inter", "ui-sans-serif", "system-ui"],
            },
            boxShadow: {
              fluent: "0 18px 42px rgba(20, 32, 54, 0.14), 0 2px 8px rgba(20, 32, 54, 0.08)",
              soft: "0 8px 28px rgba(20, 32, 54, 0.10)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="../dist/wasm_exec.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body class="min-h-screen bg-[#f6f7fb] text-slate-950 antialiased">
    <div class="min-h-screen">
      <header class="border-b border-white/70 bg-white/76 backdrop-blur-xl">
        <div class="mx-auto flex max-w-[1560px] flex-col gap-4 px-4 py-4 sm:px-6 lg:px-8">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              <div class="grid h-10 w-10 place-items-center rounded-lg bg-[#2563eb] text-white shadow-soft">
                <i data-lucide="scan-search" class="h-5 w-5"></i>
              </div>
              <div>
                <h1 class="text-lg font-semibold tracking-normal">Pre-print Tools</h1>
                <p id="summaryLine" class="text-sm text-slate-600">WASM loading</p>
              </div>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <span id="runtimeStatus" class="status-pill bg-slate-100 text-slate-700">
                <span class="status-dot bg-slate-400"></span>
                Starting
              </span>
              <a
                href="../README.md"
                class="icon-button"
                title="Open README"
                aria-label="Open README"
              >
                <i data-lucide="book-open" class="h-4 w-4"></i>
              </a>
            </div>
          </div>

          <div class="toolbar">
            <input id="fileInput" type="file" accept=".svg,image/svg+xml" class="sr-only" />
            <label for="fileInput" class="command-button bg-white text-slate-800 hover:bg-slate-50">
              <i data-lucide="folder-open" class="h-4 w-4"></i>
              Open SVG
            </label>

            <label class="field min-w-[210px] flex-1">
              <span>Sample</span>
              <select id="sampleSelect">
                <option value="">None</option>
                <option value="../internal/svgcheck/testdata/print-edge-near-disconnected-lines.svg">Near disconnected lines</option>
                <option value="../internal/svgcheck/testdata/print-edge-thin-lines.svg">Thin print lines</option>
                <option value="../internal/svgcheck/testdata/print-edge-effects.svg">Effects and shadows</option>
                <option value="../internal/svgcheck/testdata/print-edge-stylized-fonts.svg">Stylized fonts</option>
                <option value="../internal/svgcheck/testdata/code-example.svg">Code example</option>
              </select>
            </label>

            <label class="field min-w-[160px]">
              <span>Target</span>
              <select id="targetSelect">
                <option value="paper">Paper</option>
                <option value="vinyl">Vinyl</option>
                <option value="fabric@14in">Fabric 14in</option>
                <option value="banner@20ft">Banner 20ft</option>
                <option value="screen">Screen</option>
                <option value="packaging">Packaging</option>
                <option value="laser">Laser</option>
                <option value="custom">Custom</option>
              </select>
            </label>

            <label id="customTargetWrap" class="field hidden min-w-[140px]">
              <span>Size</span>
              <input id="customTarget" type="text" placeholder="20ft" />
            </label>

            <label class="toggle">
              <input id="unsafeToggle" type="checkbox" />
              <span></span>
              Unsafe fixes
            </label>

            <button id="analyzeButton" class="command-button bg-[#2563eb] text-white hover:bg-[#1d4ed8]">
              <i data-lucide="sparkles" class="h-4 w-4"></i>
              Analyze
            </button>
            <button id="fixSafeButton" class="command-button bg-[#0f766e] text-white hover:bg-[#115e59]">
              <i data-lucide="wrench" class="h-4 w-4"></i>
              Fix safe
            </button>
            <button id="downloadSvgButton" class="icon-button" title="Download current SVG" aria-label="Download current SVG">
              <i data-lucide="download" class="h-4 w-4"></i>
            </button>
            <button id="downloadOverlayButton" class="icon-button" title="Download overlay SVG" aria-label="Download overlay SVG">
              <i data-lucide="layers" class="h-4 w-4"></i>
            </button>
          </div>
        </div>
      </header>

      <main class="mx-auto grid max-w-[1560px] gap-5 px-4 py-5 sm:px-6 lg:grid-cols-[minmax(0,1fr)_390px] lg:px-8">
        <section class="workspace-panel min-h-[620px]">
          <div class="view-head">
            <div class="segmented" role="tablist" aria-label="Preview mode">
              <button class="active" data-view="original" role="tab">Original</button>
              <button data-view="overlay" role="tab">Overlay</button>
              <button data-view="source" role="tab">Source</button>
            </div>
            <div id="fileName" class="truncate text-sm text-slate-500">No file selected</div>
          </div>

          <div id="visualPane" class="visual-pane">
            <img id="svgPreview" alt="SVG preview" class="max-h-full max-w-full" />
            <div id="emptyVisual" class="empty-state">
              <i data-lucide="image" class="h-8 w-8"></i>
              <span>No SVG loaded</span>
            </div>
          </div>

          <textarea
            id="sourceInput"
            spellcheck="false"
            class="source-editor hidden"
            placeholder="<svg ...></svg>"
          ></textarea>
        </section>

        <aside class="space-y-5">
          <section class="summary-panel">
            <div class="flex items-start justify-between gap-3">
              <div>
                <p class="text-xs font-semibold uppercase text-slate-500">Summary</p>
                <h2 id="reportSummary" class="mt-1 text-xl font-semibold tracking-normal">Ready</h2>
              </div>
              <div class="grid grid-cols-3 gap-2 text-center">
                <div class="counter bg-rose-50 text-rose-700">
                  <strong id="errorCount">0</strong>
                  <span>Err</span>
                </div>
                <div class="counter bg-amber-50 text-amber-700">
                  <strong id="warningCount">0</strong>
                  <span>Warn</span>
                </div>
                <div class="counter bg-sky-50 text-sky-700">
                  <strong id="infoCount">0</strong>
                  <span>Info</span>
                </div>
              </div>
            </div>
            <dl id="metaGrid" class="meta-grid"></dl>
          </section>

          <section class="issues-panel">
            <div class="flex items-center justify-between gap-3">
              <h2 class="text-base font-semibold tracking-normal">Issues</h2>
              <button id="applyReportFixesButton" class="command-button bg-white text-slate-800 hover:bg-slate-50">
                <i data-lucide="list-checks" class="h-4 w-4"></i>
                Apply shown
              </button>
            </div>
            <div id="issuesList" class="mt-3 space-y-3"></div>
          </section>

          <section class="activity-panel">
            <div class="flex items-center justify-between">
              <h2 class="text-base font-semibold tracking-normal">Activity</h2>
              <button id="clearLogButton" class="icon-button" title="Clear activity" aria-label="Clear activity">
                <i data-lucide="trash-2" class="h-4 w-4"></i>
              </button>
            </div>
            <div id="activityLog" class="mt-3 space-y-2 text-sm text-slate-600"></div>
          </section>
        </aside>
      </main>
    </div>
  </body>
</html>
